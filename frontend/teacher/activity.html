<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity - Teacher Dashboard</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍎</text></svg>">
    <link rel="stylesheet" href="../main.css">
</head>

<body class="bg-light">

    <div class="container" style="padding-top: 2rem; padding-bottom: 2rem;">

        <!-- Header -->
        <header class="flex justify-between items-center mb-4">
            <div class="flex items-center gap-2">
                <a href="dashboard.html" class="btn btn-secondary" style="padding: 0.5rem 1rem;">&larr; Back</a>
                <h2 style="margin: 0; color: var(--text-primary);">Activity & Announcements</h2>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2">
                    <span id="teacherName" style="font-weight: 600; color: var(--text-primary);">Teacher Name</span>
                    <a href="profile.html">
                        <img id="teacherPhoto" src="../images/default-profile.png"
                            onerror="this.src='https://ui-avatars.com/api/?name=Teacher&background=random'"
                            style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border-color);">
                    </a>
                </div>
            </div>
        </header>

        <!-- Post Activity Section -->
        <div class="card mb-4">
            <div class="card-header">
                <h3 class="card-title text-primary">Post New Activity</h3>
            </div>

            <div id="successMsg" class="alert alert-success" style="display: none;">
                Activity posted successfully!
            </div>
            <div id="errorMsg" class="alert alert-danger" style="display: none;"></div>

            <form id="addActivityForm">
                <div class="grid grid-2">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" name="title" required placeholder="e.g., Art Competition"
                            class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Class Name</label>
                        <select name="className" id="classSelect" required class="form-control">
                            <option value="" disabled selected>Select Class</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" rows="4" required class="form-control"
                        placeholder="Describe the activity..."></textarea>
                </div>

                <button type="submit" class="btn btn-primary">Post Activity</button>
            </form>
        </div>

        <!-- Recent Activities Section -->
        <div class="card">
            <div class="card-header">
                <h3 class="card-title text-primary">Recent Activities</h3>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Title</th>
                            <th>Class Name</th>
                            <th>Description</th>
                        </tr>
                    </thead>
                    <tbody id="activityTableBody">
                        <!-- Loaded dynamically -->
                        <tr>
                            <td colspan="4" class="text-center">Loading activities...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        const API_BASE_URL = 'http://' + window.location.hostname + ':9097';

        async function init() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '../login.html';
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/api/teacher/activityPage`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();

                    // Teacher Info
                    if (data.teacher) {
                        const nameEl = document.getElementById('teacherName');
                        if (nameEl) nameEl.innerText = data.teacher.name;

                        // const photoEl = document.getElementById('teacherPhoto');
                        if (data.teacher.photo) {
                            const photoEl = document.getElementById('teacherPhoto');
                            if (photoEl) {
                                if (data.teacher.photo.startsWith('http')) {
                                    photoEl.src = data.teacher.photo;
                                } else {
                                    photoEl.src = API_BASE_URL + data.teacher.photo;
                                }
                            }
                        }
                    }

                    // Class Names dropdown
                    const classSelect = document.getElementById('classSelect');
                    if (classSelect && data.classNames) {
                        // Clear existing options except first
                        while (classSelect.options.length > 1) {
                            classSelect.remove(1);
                        }

                        data.classNames.forEach(className => {
                            const option = document.createElement('option');
                            option.value = className;
                            option.text = className;
                            classSelect.appendChild(option);
                        });
                    }

                    // Activities Table
                    const tbody = document.getElementById('activityTableBody');
                    if (tbody) {
                        tbody.innerHTML = '';
                        if (data.activities && data.activities.length > 0) {
                            data.activities.forEach(act => {
                                const tr = document.createElement('tr');
                                tr.innerHTML = `
                                    <td>${act.date || ''}</td>
                                    <td style="font-weight: 500; color: var(--primary-color);">${act.title || ''}</td>
                                    <td><span class="badge" style="background: #e0f2fe; color: #0284c7; padding: 4px 8px; border-radius: 4px; font-size: 0.85em;">${act.className || ''}</span></td>
                                    <td>${act.description || ''}</td>
                                `;
                                tbody.appendChild(tr);
                            });
                        } else {
                            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color: var(--text-secondary); padding: 2rem;">No activities found</td></tr>';
                        }
                    }

                } else {
                    if (response.status === 401 || response.status === 403) {
                        window.location.href = '../login.html';
                    }
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Handle Add Activity
        const addActivityForm = document.getElementById('addActivityForm');
        if (addActivityForm) {
            addActivityForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const token = localStorage.getItem('token');
                const formData = new FormData(e.target);

                const data = new URLSearchParams();
                for (const pair of formData) {
                    data.append(pair[0], pair[1]);
                }


                try {
                    const response = await fetch(`${API_BASE_URL}/api/teacher/addActivity`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/x-www-form-urlencoded'
                        },
                        body: data
                    });

                    const result = await response.json();

                    if (response.ok && result.status === 'success') {
                        const successMsg = document.getElementById('successMsg');
                        if (successMsg) {
                            successMsg.style.display = 'block';
                            setTimeout(() => successMsg.style.display = 'none', 3000);
                        }
                        addActivityForm.reset();
                        init(); // Refresh list
                    } else {
                        alert('Failed to add activity');
                    }
                } catch (error) {
                    console.error('Error:', error);
                    alert('Connection error');
                }
            });
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>

</html>
