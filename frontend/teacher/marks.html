<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marks - Teacher Dashboard</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍎</text></svg>">
    <link rel="stylesheet" href="../main.css">
</head>

<body class="bg-light">

    <div class="container" style="padding-top: 2rem; padding-bottom: 2rem;">

        <!-- Header -->
        <header class="flex justify-between items-center mb-4">
            <div class="flex items-center gap-2">
                <a href="dashboard.html" class="btn btn-secondary" style="padding: 0.5rem 1rem;">&larr; Back</a>
                <h2 style="margin: 0; color: var(--text-primary);">Marks & Exams</h2>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2">
                    <span id="teacherName" style="font-weight: 600; color: var(--text-primary);">Teacher Name</span>
                    <a href="profile.html">
                        <img id="teacherPhoto" src="../images/default-profile.png"
                            onerror="this.src='https://ui-avatars.com/api/?name=Teacher&background=random'"
                            style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border-color);">
                    </a>
                </div>
            </div>
        </header>

        <div id="successMsg" class="alert alert-success" style="display: none;">
            Marks saved successfully!
        </div>
        <div id="errorMsg" class="alert alert-danger" style="display: none;"></div>

        <div class="card mb-4">
            <div class="card-header">
                <h3 class="card-title text-primary">Add Exam Marks</h3>
            </div>
            <form id="addDocsForm">
                <div class="grid grid-2" style="gap: 1.5rem;">
                    <div class="form-group">
                        <label class="form-label">Class Name</label>
                        <select name="className" required class="form-control">
                            <option value="Playgroup">Playgroup</option>
                            <option value="Nursery">Nursery</option>
                            <option value="LKG">LKG</option>
                            <option value="UKG">UKG</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Roll No</label>
                        <input type="text" name="rollNo" required class="form-control"
                            placeholder="Enter student roll number">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Exam Name</label>
                        <select name="examName" required class="form-control">
                            <option value="Unit Test 1">Unit Test 1</option>
                            <option value="Mid-Term">Mid-Term</option>
                            <option value="Unit Test 2">Unit Test 2</option>
                            <option value="Final">Final</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Subject</label>
                        <input type="text" name="subject" required class="form-control" placeholder="Enter subject">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Marks Obtained</label>
                        <input type="number" name="marksObtained" required class="form-control" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Total Marks</label>
                        <input type="number" name="totalMarks" required class="form-control" placeholder="100">
                    </div>
                </div>
                <div class="flex justify-end mt-4">
                    <button type="submit" class="btn btn-primary">Save Marks</button>
                </div>
            </form>
        </div>

        <div class="card">
            <div class="card-header">
                <h3 class="card-title text-primary">Exam Results List</h3>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Student Name</th>
                            <th>Roll No</th>
                            <th>Exam Name</th>
                            <th>Subject</th>
                            <th>Marks</th>
                            <th>Total</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="marksTableBody">
                        <!-- Marks loaded here -->
                        <tr>
                            <td colspan="7" class="text-center">Loading results...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://' + window.location.hostname + ':9097';

        async function init() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '../login.html';
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/api/teacher/marksPage`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const data = await response.json();

                    // Teacher
                    if (data.teacher) {
                        document.getElementById('teacherName').innerText = data.teacher.name;
                        if (data.teacher.photo) {
                            const photoEl = document.getElementById('teacherPhoto');
                            if (photoEl) {
                                if (data.teacher.photo.startsWith('http')) {
                                    photoEl.src = data.teacher.photo;
                                } else {
                                    photoEl.src = API_BASE_URL + data.teacher.photo;
                                }
                            }
                        }
                    }

                    // Student selection logic REMOVED as per request to use Class+RollNo
                    // The dropdown #studentSelect is gone.

                    // Exam Results
                    const tbody = document.getElementById('marksTableBody');
                    tbody.innerHTML = '';
                    if (data.examResults && data.examResults.length > 0) {
                        data.examResults.forEach(res => {
                            const tr = document.createElement('tr');
                            tr.innerHTML = `
                                <td style="font-weight: 500;">${res.student ? res.student.name : '-'}</td>
                                <td>${res.student && res.student.rollNo ? res.student.rollNo : 'N/A'}</td>
                                <td><span class="badge" style="background: #e0f2fe; color: #0284c7;">${res.examName || ''}</span></td>
                                <td>${res.subject || ''}</td>
                                <td>${res.marksObtained || ''}</td>
                                <td>${res.totalMarks || ''}</td>
                                <td>
                                    <a href="edit_exam_result.html?id=${res.id}" class="btn btn-sm btn-primary"
                                        style="font-size: 0.85rem; padding: 0.25rem 0.75rem;">Edit</a>
                                </td>
                            `;
                            tbody.appendChild(tr);
                        });
                    } else {
                        tbody.innerHTML = '<tr><td colspan="7" class="text-center" style="padding: 2rem; color: var(--text-secondary);">No results found</td></tr>';
                    }

                } else {
                    if (response.status === 401 || response.status === 403) {
                        window.location.href = '../login.html';
                    }
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Add Exam Result
        document.getElementById('addDocsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('token');
            const formData = new FormData(e.target);
            const data = new URLSearchParams();
            for (const pair of formData) {
                data.append(pair[0], pair[1]);
            }

            try {
                const response = await fetch(`${API_BASE_URL}/api/teacher/addExamResult`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: data
                });

                const result = await response.json();

                if (response.ok && result.status === 'success') {
                    const successMsg = document.getElementById('successMsg');
                    successMsg.style.display = 'block';
                    document.getElementById('addDocsForm').reset();
                    init();
                    setTimeout(() => successMsg.style.display = 'none', 3000);
                } else {
                    alert('Failed to save marks');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Connection error');
            }
        });

        // Logout


        init();
    </script>
</body>

</html>
