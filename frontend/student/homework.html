<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homework - Student Dashboard</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    <link rel="stylesheet" href="../main.css">
    <style>
        .error {
            background: #fef2f2;
            color: #ef4444;
            padding: 1rem;
            border-radius: var(--border-radius);
            margin-bottom: 1rem;
            border: 1px solid #fecaca;
        }
    </style>
</head>

<body class="bg-light">

    <div class="container" style="padding-top: 2rem; padding-bottom: 2rem;">

        <!-- Header -->
        <header class="flex justify-between items-center mb-4">
            <div class="flex items-center gap-2">
                <a href="dashboard.html" class="btn btn-secondary" style="padding: 0.5rem 1rem;">&larr; Back</a>
                <h2 style="margin: 0; color: var(--text-primary);">My Homework</h2>
            </div>
            <div class="flex items-center gap-4">
                <a href="profile.html">
                    <img id="studentPhotoHeader" src="../images/default-profile.png"
                        onerror="this.src='https://ui-avatars.com/api/?name=Student&background=random'"
                        style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border-color);">
                </a>
            </div>
        </header>

        <div id="errorContainer"></div>

        <div class="card">
            <div class="card-header">
                <h3 class="card-title text-primary">Assigned Homework</h3>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Assigned Date</th>
                            <th>Title</th>
                            <th>Description</th>
                            <th>Due Date</th>
                            <th>Status</th>
                            <th>Teacher</th>
                        </tr>
                    </thead>
                    <tbody id="homeworkTableBody">
                        <tr>
                            <td colspan="6" class="text-center" style="padding: 24px;">Loading homework...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://' + window.location.hostname + ':9097';

        document.addEventListener('DOMContentLoaded', function () {
            loadHomeworkData();
        });

        function loadHomeworkData() {
            fetch(`${API_BASE_URL}/api/student/getHomework`, {
                method: 'GET',
                credentials: 'include',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${localStorage.getItem('token')}`
                }
            })
                .then(response => {
                    if (!response.ok) {
                        if (response.status === 401 || response.status === 403) {
                            window.location.href = '../login.html';
                        }
                        throw new Error(`HTTP ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    if (data.error) {
                        showError(data.error);
                        return;
                    }

                    // Update student info
                    if (data.student) {
                        if (data.student.photo) {
                            const photoEl = document.getElementById('studentPhotoHeader');
                            if (photoEl) {
                                if (data.student.photo.startsWith('http')) {
                                    photoEl.src = data.student.photo;
                                } else {
                                    photoEl.src = API_BASE_URL + data.student.photo;
                                }
                            }
                        }
                    }

                    // Render homework table
                    const tbody = document.getElementById('homeworkTableBody');
                    if (data.homeworkList && data.homeworkList.length > 0) {
                        tbody.innerHTML = data.homeworkList.map(hw => {
                            const today = new Date();
                            const todayStr = today.getFullYear() + "-" + String(today.getMonth() + 1).padStart(2, '0') + "-" + String(today.getDate()).padStart(2, '0');
                            const isExpired = hw.dueDate < todayStr;

                            // Adjust display text for teacher to handle nulls gracefully
                            const teacherName = (hw.teacher && hw.teacher.name) ? hw.teacher.name : 'N/A';

                            return `
                            <tr>
                                <td>${hw.assignedDate || 'N/A'}</td>
                                <td style="font-weight: 500;">${hw.title || 'N/A'}</td>
                                <td>${hw.description || 'N/A'}</td>
                                <td>${hw.dueDate || 'N/A'}</td>
                                <td style="color: ${isExpired ? '#ef4444' : '#10b981'}; font-weight: 600;">
                                    ${isExpired ? 'Expired' : 'Active'}
                                </td>
                                <td>${teacherName}</td>
                            </tr>
                        `;
                        }).join('');
                    } else {
                        tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 24px; color: var(--text-secondary);">No homework assigned.</td></tr>';
                    }
                })
                .catch(error => {
                    console.error('Error loading homework:', error);
                    showError('Failed to load homework. Please try again.');
                });
        }

        function showError(message) {
            const errorContainer = document.getElementById('errorContainer');
            errorContainer.innerHTML = `<div class="error">${message}</div>`;
        }
    </script>
</body>

</html>
