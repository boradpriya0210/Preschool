spring.application.name=preschool

# spring.datasource.url=jdbc:mysql://localhost:3306/preschool?createDatabaseIfNotExist=true
# spring.datasource.username=root
# spring.datasource.password=2210
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

logging.level.root=INFO
logging.level.com.preschool=DEBUG
logging.file.name=logs/preschool.log
server.port=${PORT:8080}
# server.port=9097


# File Upload Limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
